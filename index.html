<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Liquidity Calculator Pro</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, set, get, update, child } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
        const firebaseConfig = { apiKey: "AIzaSyAkZf1nLWojE7wgP00IRU8_2Tqw2RAyB_k", authDomain: "trade-78a40.firebaseapp.com", databaseURL: "https://trade-78a40-default-rtdb.firebaseio.com", projectId: "trade-78a40", storageBucket: "trade-78a40.firebasestorage.app", messagingSenderId: "178344205557", appId: "1:178344205557:web:e888adc3765386e0efb9bc" };
        const app = initializeApp(firebaseConfig);
        window.db = getDatabase(app);
        window.dbRef = ref; window.set = set; window.get = get; window.update = update; window.child = child;
    </script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: 'Consolas', 'Courier New', monospace; background-color: #060709; color: #00ffcc; margin: 0; padding: 15px; min-height: 100vh; }
        .navbar { display: flex; justify-content: space-between; align-items: center; background-color: #0f111a; padding: 15px 25px; border-bottom: 2px solid #00ffcc; border-radius: 8px; margin-bottom: 20px; }
        .container { max-width: 550px; margin: 0 auto; background-color: #0f111a; padding: 30px; border-radius: 16px; border: 2px solid #00ffcc; }
        .page { display: none; } .page.active { display: block; }
        .input-group { margin-bottom: 15px; }
        label { display: block; color: #00ffcc; font-size: 13px; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #008877; background-color: #060709; color: #fff; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; color: #060709; font-weight: bold; cursor: pointer; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; color: white; }
        th, td { padding: 10px; text-align: center; border: 1px solid #008877; font-size: 13px; }
        .glass-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .glass-overlay.active { display: flex; }
        .glass-modal { background: #151720; padding: 30px; border-radius: 20px; border: 1px solid #00ffcc; text-align: center; }
    </style>
</head>
<body>

<div class="navbar">
    <brand style="cursor:pointer" onclick="openSecretAdmin()">CREATED BY OZOD TRADER</brand>
    <div id="nav-links"></div>
</div>

<div class="container">
    <div id="page-auth" class="page active">
        <h2 id="auth-title">Tizimga Kirish</h2>
        <div class="input-group"><label>Foydalanuvchi nomi:</label><input type="text" id="auth-username"></div>
        <div class="input-group"><label>Parol:</label><input type="password" id="auth-password"></div>
        <button class="btn" style="background:#00aa88" onclick="handleAuth()">Kirish</button>
        <p style="text-align:center; cursor:pointer; font-size:12px;" onclick="toggleAuthMode()" id="auth-toggle">Akkaunt yo'qmi? Ro'yxatdan o'tish</p>
    </div>

    <div id="page-calc" class="page">
        <h2>Liquidity Level Calc</h2>
        <div id="premium-locked" style="display:none; text-align:center; color:#ff007f; padding:20px; border:1px dashed;">PREMIUM FAOL EMAS!</div>
        <div id="calc-interface" style="display:none;">
            <div class="input-group"><label>High narx:</label><input type="number" id="high" step="any"></div>
            <div class="input-group"><label>Low narx:</label><input type="number" id="low" step="any"></div>
            <div style="display: flex; gap: 10px;">
                <button class="btn" style="background:#4cc9f0" onclick="calculateZones('buy')">BUY HISOBLASH</button>
                <button class="btn" style="background:#f72585" onclick="calculateZones('sell')">SELL HISOBLASH</button>
            </div>
            <div id="calc-results" style="display:none; margin-top:20px;">
                <table><thead><tr><th id="zone-header">Zona</th><th>Narx</th></tr></thead><tbody id="result-body"></tbody></table>
            </div>
        </div>
    </div>

    <div id="page-admin" class="page">
        <h2>Admin Panel</h2>
        <table id="admin-user-table"><thead><tr><th>User</th><th>Prem</th><th>Amal</th></tr></thead><tbody></tbody></table>
    </div>
</div>

<div class="glass-overlay" id="secretModalOverlay">
    <div class="glass-modal">
        <h3>Maxfiy kod:</h3>
        <input type="password" id="secretCodeInput">
        <button class="btn" style="background:#00aa88" onclick="submitSecretCode()">OK</button>
    </div>
</div>

<script>
    let currentUser = null; let isLoginMode = true;
    async function handleAuth() {
        const u = document.getElementById('auth-username').value.trim().toLowerCase();
        const p = document.getElementById('auth-password').value.trim();
        const snap = await get(child(dbRef(window.db), 'users/' + u));
        if(isLoginMode) {
            if(snap.exists() && snap.val().password === p) { currentUser = u; navigate(snap.val().isAdmin ? 'admin' : 'calc'); updateNavbar(); } else alert("Xato!");
        } else {
            if(snap.exists()) alert("Login band!"); else { await set(dbRef(window.db, 'users/' + u), { password: p, isPremium: false, isAdmin: false }); alert("Saqlandi!"); }
        }
    }
    function toggleAuthMode() { isLoginMode = !isLoginMode; document.getElementById('auth-title').innerText = isLoginMode ? "Tizimga Kirish" : "Ro'yxatdan O'tish"; }
    async function navigate(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        if(pageId === 'calc') checkPremium(); if(pageId === 'admin') renderAdmin();
    }
    async function checkPremium() {
        const snap = await get(child(dbRef(window.db), 'users/' + currentUser));
        const user = snap.val();
        document.getElementById('calc-interface').style.display = (user.isPremium || user.isAdmin) ? 'block' : 'none';
        document.getElementById('premium-locked').style.display = (user.isPremium || user.isAdmin) ? 'none' : 'block';
    }
    function calculateZones(type) {
        const h = parseFloat(document.getElementById('high').value);
        const l = parseFloat(document.getElementById('low').value);
        if(isNaN(h) || isNaN(l)) return alert("Narxni kiriting!");
        const r = Math.abs(h - l);
        document.getElementById('zone-header').innerText = "Zona (" + type.toUpperCase() + ")";
        let levels = type === 'buy' ? 
            [{n:'Razvorot', v:l+r*0.236}, {n:'Korrektsiya', v:l+r*0.5}, {n:'Konsolidatsiya', v:l+r*0.764}, {n:'Ext-1', v:l+r*1.272}, {n:'Ext-2', v:l+r*1.618}] :
            [{n:'Razvorot', v:h-r*0.236}, {n:'Korrektsiya', v:h-r*0.5}, {n:'Konsolidatsiya', v:h-r*0.764}, {n:'Ext-1', v:h-r*1.272}, {n:'Ext-2', v:h-r*1.618}];
        document.getElementById('result-body').innerHTML = levels.map(lev => `<tr><td>${lev.n}</td><td>${lev.v.toFixed(2)}</td></tr>`).join('');
        document.getElementById('calc-results').style.display = 'block';
    }
    function updateNavbar() { document.getElementById('nav-links').innerHTML = `<button class="btn" style="background:none; border:1px solid #00ffcc; color:#00ffcc" onclick="location.reload()">Chiqish</button>`; }
    function openSecretAdmin() { document.getElementById('secretModalOverlay').classList.add('active'); }
    function submitSecretCode() { if(document.getElementById('secretCodeInput').value === "20111011") { document.getElementById('secretModalOverlay').classList.remove('active'); currentUser = 'admin'; navigate('admin'); updateNavbar(); } else alert("Xato!"); }
    async function renderAdmin() {
        const snap = await get(child(dbRef(window.db), 'users'));
        let t = document.querySelector('#admin-user-table tbody'); t.innerHTML = '';
        snap.forEach(c => { if(!c.val().isAdmin) t.innerHTML += `<tr><td>${c.key}</td><td>${c.val().isPremium ? '✅':'❌'}</td><td><button onclick="togglePrem('${c.key}', ${!c.val().isPremium})">O'z</button></td></tr>`; });
    }
    async function togglePrem(u, v) { await update(dbRef(window.db, 'users/' + u), { isPremium: v }); renderAdmin(); }
</script>
</body>
</html>
